<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>上报频率测试</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    .test-case {
      margin: 20px 0;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    .result {
      margin-top: 10px;
      padding: 10px;
      background: #f5f5f5;
      border-radius: 4px;
    }
    .success {
      color: green;
    }
    .error {
      color: red;
    }
  </style>
</head>
<body>
  <h1>上报频率计算测试</h1>
  
  <div class="test-case">
    <h3>测试用例 1: 30分钟检测频率，6次后上报</h3>
    <p>检测频率: 30分钟，上报周期: 6次</p>
    <div class="result" id="test1"></div>
  </div>
  
  <div class="test-case">
    <h3>测试用例 2: 1分钟检测频率，10次后上报</h3>
    <p>检测频率: 1分钟，上报周期: 10次</p>
    <div class="result" id="test2"></div>
  </div>
  
  <div class="test-case">
    <h3>测试用例 3: 60分钟检测频率，2次后上报</h3>
    <p>检测频率: 60分钟，上报周期: 2次</p>
    <div class="result" id="test3"></div>
  </div>
  
  <div class="test-case">
    <h3>测试用例 4: 1440分钟检测频率，1次后上报</h3>
    <p>检测频率: 1440分钟，上报周期: 1次</p>
    <div class="result" id="test4"></div>
  </div>
  
  <div class="test-case">
    <h3>测试用例 5: 5分钟检测频率，12次后上报</h3>
    <p>检测频率: 5分钟，上报周期: 12次</p>
    <div class="result" id="test5"></div>
  </div>

  <script>
    // 从 main.js 复制的计算函数
    function calculateReportFrequency(detectInterval, reportCycle) {
      // 计算总分钟数
      const totalMinutes = detectInterval * reportCycle;
      
      // 转换为友好的时间显示
      let frequencyText = '';
      if (totalMinutes < 60) {
        frequencyText = `${totalMinutes}分钟`;
      } else if (totalMinutes < 1440) {
        const hours = Math.floor(totalMinutes / 60);
        const minutes = totalMinutes % 60;
        if (minutes === 0) {
          frequencyText = `${hours}小时`;
        } else {
          frequencyText = `${hours}小时${minutes}分钟`;
        }
      } else {
        const days = Math.floor(totalMinutes / 1440);
        const hours = Math.floor((totalMinutes % 1440) / 60);
        if (hours === 0) {
          frequencyText = `${days}天`;
        } else {
          frequencyText = `${days}天${hours}小时`;
        }
      }
      
      return frequencyText;
    }
    
    // 测试用例
    const testCases = [
      { id: 'test1', detectInterval: 30, reportCycle: 6, expected: '3小时' },
      { id: 'test2', detectInterval: 1, reportCycle: 10, expected: '10分钟' },
      { id: 'test3', detectInterval: 60, reportCycle: 2, expected: '2小时' },
      { id: 'test4', detectInterval: 1440, reportCycle: 1, expected: '1天' },
      { id: 'test5', detectInterval: 5, reportCycle: 12, expected: '1小时' }
    ];
    
    // 运行测试
    testCases.forEach(test => {
      const result = calculateReportFrequency(test.detectInterval, test.reportCycle);
      const element = document.getElementById(test.id);
      const isCorrect = result === test.expected;
      
      element.innerHTML = `
        <div>计算结果: <strong>${result}</strong></div>
        <div>预期结果: ${test.expected}</div>
        <div class="${isCorrect ? 'success' : 'error'}">
          ${isCorrect ? '✓ 测试通过' : '✗ 测试失败'}
        </div>
      `;
    });
    
    // 显示测试总结
    const summary = document.createElement('div');
    summary.className = 'test-case';
    summary.innerHTML = '<h3>测试总结</h3>';
    
    const passed = testCases.filter(t => 
      calculateReportFrequency(t.detectInterval, t.reportCycle) === t.expected
    ).length;
    
    summary.innerHTML += `
      <p>总测试用例: ${testCases.length}</p>
      <p>通过: ${passed}</p>
      <p>失败: ${testCases.length - passed}</p>
      <p>通过率: ${Math.round((passed / testCases.length) * 100)}%</p>
    `;
    
    document.body.appendChild(summary);
  </script>
</body>
</html>
